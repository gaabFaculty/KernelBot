# Railway — https://docs.railway.com/config-as-code/reference
# Deploy: ligar repo GitHub → Railway detecta Dockerfile + este ficheiro.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
# Boot: rebuild BM25 a partir do MySQL pode demorar alguns segundos.
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
